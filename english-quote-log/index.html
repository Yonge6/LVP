<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 小时英语句子记录</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --paper-strong: #fffaf0;
      --ink: #151515;
      --muted: #6b6257;
      --line: rgba(21, 21, 21, 0.16);
      --green: #2f6d55;
      --green-dark: #194836;
      --red: #c85745;
      --yellow: #efc35a;
      --blue: #2c5f8a;
      --shadow: 5px 5px 0 var(--ink);
      --radius: 8px;
      --sans: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(21,21,21,0.045) 1px, transparent 1px),
        linear-gradient(rgba(21,21,21,0.04) 1px, transparent 1px),
        var(--paper);
      background-size: 26px 26px;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
      letter-spacing: 0;
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 38px;
    }

    .top {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hero,
    .manage-panel,
    .record,
    dialog {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: rgba(255, 250, 240, 0.9);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 14px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 300px);
      align-items: center;
      gap: 14px;
    }

    .hero:after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -38px;
      width: 180px;
      height: 140px;
      background:
        linear-gradient(135deg, transparent 42%, rgba(47,109,85,0.2) 42% 52%, transparent 52%),
        linear-gradient(45deg, transparent 40%, rgba(200,87,69,0.18) 40% 50%, transparent 50%);
      transform: rotate(-8deg);
      opacity: 0.45;
    }

    h1 {
      margin: 12px 0 0;
      max-width: 760px;
      font-family: var(--serif);
      font-size: clamp(26px, 3.5vw, 40px);
      line-height: 1.06;
      font-weight: 700;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      position: relative;
      z-index: 1;
    }

    .manage-panel {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      padding: 9px 10px;
      min-height: 58px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-family: var(--serif);
      font-size: 23px;
      line-height: 1;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .practice-link {
      background: var(--blue);
      color: white;
      text-decoration: none;
      width: fit-content;
      min-height: 52px;
      padding: 0 18px;
      font-size: 15px;
      box-shadow: 5px 5px 0 var(--ink);
    }

    .voice-box {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      padding: 9px;
      position: relative;
      z-index: 1;
    }

    .voice-box label {
      margin: 0;
    }

    .voice-box small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .btn,
    .icon-btn {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      font-weight: 900;
    }

    .btn.primary {
      background: var(--green);
      color: white;
    }

    .btn.warn {
      background: var(--red);
      color: white;
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .btn:active,
    .icon-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--ink);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 14px 0 10px;
    }

    .section-head.compact {
      margin-top: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .records {
      display: grid;
      gap: 14px;
    }

    .record {
      overflow: hidden;
    }

    .record-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 2px solid var(--ink);
      background: var(--green);
      color: white;
    }

    .record-time {
      font-weight: 900;
    }

    .record-count {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .quote-list {
      display: grid;
      gap: 0;
    }

    .quote {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
    }

    .quote-actions {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .quote:last-child { border-bottom: 0; }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      background: var(--yellow);
    }

    .icon-btn.stop {
      background: var(--red);
      color: white;
    }

    .english {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.36;
    }

    .translation {
      margin: 8px 0 0;
      color: var(--green-dark);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 700;
    }

    .source {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      display: none;
      border: 2px dashed var(--ink);
      border-radius: var(--radius);
      padding: 26px;
      background: rgba(255,250,240,0.75);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .site-footer {
      margin-top: 26px;
      border-top: 2px solid var(--ink);
      padding: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .site-footer a {
      color: var(--ink);
      font-weight: 900;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    dialog {
      width: min(760px, calc(100% - 24px));
      padding: 0;
    }

    #shareDialog {
      width: min(560px, calc(100% - 24px));
    }

    dialog::backdrop {
      background: rgba(21,21,21,0.45);
      backdrop-filter: blur(4px);
    }

    .dialog-head {
      padding: 16px 18px;
      border-bottom: 2px solid var(--ink);
      background: var(--blue);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .dialog-head h3 {
      margin: 0;
      font-size: 18px;
    }

    form {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 900;
      font-size: 13px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 10px 12px;
      resize: vertical;
    }

    textarea {
      min-height: 78px;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .share-body {
      padding: 18px;
      background: var(--paper);
    }

    .share-card {
      min-height: 620px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(239,195,90,0.26), transparent 35%),
        linear-gradient(315deg, rgba(47,109,85,0.18), transparent 38%),
        var(--paper-strong);
      box-shadow: 7px 7px 0 var(--ink);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 26px;
    }

    .share-card .share-kicker {
      display: inline-flex;
      width: fit-content;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .share-english {
      margin: 18px 0 0;
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.16;
    }

    .share-chinese {
      margin: 18px 0 0;
      color: var(--green-dark);
      font-size: 18px;
      line-height: 1.6;
      font-weight: 800;
    }

    .share-source {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .share-bottom {
      display: flex;
      justify-content: flex-end;
      align-items: end;
      gap: 18px;
      border-top: 2px solid var(--ink);
      padding-top: 18px;
    }

    .share-qr {
      width: 56px;
      height: 56px;
      border: 2px solid var(--ink);
      border-radius: 4px;
      background: white;
      padding: 3px;
      flex: 0 0 auto;
    }

    .share-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      .hero,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .hero:after {
        opacity: 0.45;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }

      .section-head p {
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .quote {
        grid-template-columns: 42px minmax(0, 1fr);
        padding: 14px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
      }

      .record-head {
        align-items: start;
        flex-direction: column;
      }

      .share-card {
        min-height: 560px;
        padding: 22px;
      }

      .share-bottom {
        align-items: end;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top" aria-label="页面概览">
      <div class="hero">
        <div>
          <a class="btn practice-link" href="https://docs.qq.com/aio/DZHZOWWJHT1F5RGFV" target="_blank" rel="noopener">AI驱动的英语听说练习</a>
          <h1>三句英语，随时听读。</h1>
          <p>按时间记录中英对照句子，重点放在听读、复习和分享。</p>
        </div>
        <div class="voice-box">
          <label>
            发音声音
            <select id="voiceSelect" aria-label="选择英文朗读声音">
              <option value="">自动选择</option>
            </select>
          </label>
          <small>只显示 2-3 个更自然的美式/英语声音，减少机械感。</small>
        </div>
      </div>
    </section>

    <section class="records" id="records" aria-live="polite"></section>
    <div class="empty" id="emptyState">还没有记录。点击“新增记录”添加第一组三句话。</div>
    <section class="manage-panel" aria-label="记录管理">
      <div class="toolbar">
        <button class="btn primary" id="addRecordBtn" type="button">新增记录</button>
        <button class="btn" id="exportBtn" type="button">导出</button>
        <button class="btn" id="importBtn" type="button">导入</button>
        <button class="btn warn" id="resetBtn" type="button">重置</button>
        <input class="sr-only" id="importFile" type="file" accept="application/json">
      </div>
    </section>
    <footer class="site-footer">
      <span>English Quote Log</span>
      <a href="https://yonge6.github.io/Elian" target="_blank" rel="noopener">Elian Design</a>
    </footer>
  </main>

  <dialog id="recordDialog">
    <div class="dialog-head">
      <h3>新增三句话</h3>
      <button class="icon-btn stop" id="closeDialogBtn" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <form id="recordForm">
      <label>
        记录时间
        <input id="recordTime" type="datetime-local" required>
      </label>
      <div class="form-grid">
        <label>
          英文 1
          <textarea id="english1" required></textarea>
        </label>
        <label>
          中文 1
          <textarea id="chinese1" required></textarea>
        </label>
        <label>
          来源 1
          <textarea id="source1" required></textarea>
        </label>
      </div>
      <div class="form-grid">
        <label>
          英文 2
          <textarea id="english2" required></textarea>
        </label>
        <label>
          中文 2
          <textarea id="chinese2" required></textarea>
        </label>
        <label>
          来源 2
          <textarea id="source2" required></textarea>
        </label>
      </div>
      <div class="form-grid">
        <label>
          英文 3
          <textarea id="english3" required></textarea>
        </label>
        <label>
          中文 3
          <textarea id="chinese3" required></textarea>
        </label>
        <label>
          来源 3
          <textarea id="source3" required></textarea>
        </label>
      </div>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelBtn">取消</button>
        <button class="btn primary" type="submit">保存记录</button>
      </div>
    </form>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-head">
      <h3>分享图片</h3>
      <button class="icon-btn stop" id="closeShareBtn" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <div class="share-body">
      <div class="share-card" id="shareCard">
        <div>
          <div class="share-kicker">English Quote Log</div>
          <p class="share-english" id="shareEnglish"></p>
          <p class="share-chinese" id="shareChinese"></p>
          <p class="share-source" id="shareSource"></p>
        </div>
        <div class="share-bottom">
          <img class="share-qr" id="shareQr" alt="网页链接二维码">
        </div>
      </div>
      <div class="share-actions">
        <button class="btn primary" id="saveShareImageBtn" type="button">保存图片</button>
        <button class="btn primary" id="copyQuoteBtn" type="button">复制句子</button>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    const STORAGE_KEY = "english-quote-log-v1";
    const VOICE_KEY = "english-quote-log-voice-v1";
    const PAGE_URL = "https://yonge6.github.io/Design/english-quote-log/";
    const preferredVoiceWords = [
      "samantha",
      "ava",
      "allison",
      "karen",
      "moira",
      "susan",
      "victoria",
      "alex",
      "google us english",
      "microsoft aria",
      "microsoft jenny",
      "zira"
    ];

    const seedRecords = [
      {
        id: "manual-2026-06-04-0300",
        time: "2026-06-04T03:00:00+08:00",
        quotes: [
          {
            english: "Dreams are the seedlings of realities.",
            chinese: "梦想是现实的幼苗。",
            source: "James Allen, As a Man Thinketh"
          },
          {
            english: "Courage is resistance to fear, mastery of fear, not absence of fear.",
            chinese: "勇气不是没有恐惧，而是抵抗恐惧、驾驭恐惧。",
            source: "Mark Twain"
          },
          {
            english: "Keep your eyes on the stars, and your feet on the ground.",
            chinese: "眼望星辰，脚踏实地。",
            source: "Theodore Roosevelt"
          }
        ]
      },
      {
        id: "manual-2026-06-04-0259",
        time: "2026-06-04T02:59:00+08:00",
        quotes: [
          {
            english: "Life is like riding a bicycle. To keep your balance, you must keep moving.",
            chinese: "生活就像骑自行车。要保持平衡，你就必须不断前进。",
            source: "Albert Einstein"
          },
          {
            english: "Carpe diem. Seize the day, boys. Make your lives extraordinary.",
            chinese: "及时行乐。抓住今天，孩子们。让你们的人生变得非凡。",
            source: "John Keating, Dead Poets Society"
          },
          {
            english: "The way to get started is to quit talking and begin doing.",
            chinese: "开始的方法，就是停止空谈，立刻行动。",
            source: "Walt Disney"
          }
        ]
      },
      {
        id: "manual-2026-06-03-1855",
        time: "2026-06-03T18:55:00+08:00",
        quotes: [
          {
            english: "The only way to do great work is to love what you do.",
            chinese: "做出伟大工作的唯一方式，就是热爱你所做的事。",
            source: "Steve Jobs, Stanford Commencement Address, 2005"
          },
          {
            english: "Hope is a good thing, maybe the best of things, and no good thing ever dies.",
            chinese: "希望是美好的，也许是世间最美好的东西，而美好的东西永远不会消逝。",
            source: "Andy Dufresne, The Shawshank Redemption"
          },
          {
            english: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
            chinese: "成功不是终点，失败也不是末日，真正重要的是继续前行的勇气。",
            source: "Commonly attributed to Winston Churchill"
          }
        ]
      },
      {
        id: "scheduled-2026-06-03-1840",
        time: "2026-06-03T18:40:00+08:00",
        quotes: [
          {
            english: "The future belongs to those who believe in the beauty of their dreams.",
            chinese: "未来属于那些相信梦想之美的人。",
            source: "Eleanor Roosevelt"
          },
          {
            english: "Do, or do not. There is no try.",
            chinese: "要么做，要么不做，没有“试试看”。",
            source: "Yoda, Star Wars: Episode V - The Empire Strikes Back"
          },
          {
            english: "It is never too late to be what you might have been.",
            chinese: "成为你本可以成为的人，永远不算太晚。",
            source: "George Eliot"
          }
        ]
      }
    ];

    const recordsEl = document.querySelector("#records");
    const emptyStateEl = document.querySelector("#emptyState");
    const dialog = document.querySelector("#recordDialog");
    const form = document.querySelector("#recordForm");
    const importFile = document.querySelector("#importFile");
    const voiceSelect = document.querySelector("#voiceSelect");
    const shareDialog = document.querySelector("#shareDialog");
    const shareEnglish = document.querySelector("#shareEnglish");
    const shareChinese = document.querySelector("#shareChinese");
    const shareSource = document.querySelector("#shareSource");
    const shareQr = document.querySelector("#shareQr");

    let records = loadRecords();
    let voices = [];
    let activeShareQuote = null;

    function loadRecords() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved)) {
          const savedIds = new Set(saved.map((record) => record.id));
          const missingSeedRecords = seedRecords.filter((record) => !savedIds.has(record.id));
          if (missingSeedRecords.length) {
            const merged = [...missingSeedRecords, ...saved];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(merged, null, 2));
            return merged;
          }
          return saved;
        }
      } catch (error) {
        console.warn("Failed to load saved records", error);
      }
      return seedRecords;
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records, null, 2));
    }

    function sortedRecords() {
      return [...records].sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        dateStyle: "medium",
        timeStyle: "short",
        hour12: false
      }).format(new Date(value));
    }

    function render() {
      const sorted = sortedRecords();
      recordsEl.innerHTML = "";
      emptyStateEl.style.display = sorted.length ? "none" : "block";

      sorted.forEach((record) => {
        const article = document.createElement("article");
        article.className = "record";

        const head = document.createElement("div");
        head.className = "record-head";
        head.innerHTML = `
          <div class="record-time">${escapeHtml(formatTime(record.time))}</div>
          <div class="record-count">${record.quotes.length} sentences</div>
        `;

        const list = document.createElement("div");
        list.className = "quote-list";

        record.quotes.forEach((quote, index) => {
          const row = document.createElement("div");
          row.className = "quote";
          row.innerHTML = `
            <div class="quote-actions">
              <button class="icon-btn play-btn" type="button" title="朗读英文 ${index + 1}" aria-label="朗读英文 ${index + 1}">▶</button>
              <button class="icon-btn share-btn" type="button" title="生成分享图片 ${index + 1}" aria-label="生成分享图片 ${index + 1}">↗</button>
            </div>
            <div>
              <p class="english">${escapeHtml(quote.english)}</p>
              <p class="translation">${escapeHtml(quote.chinese)}</p>
              <p class="source">(${escapeHtml(quote.source)})</p>
            </div>
          `;
          row.querySelector(".play-btn").addEventListener("click", () => speakEnglish(quote.english));
          row.querySelector(".share-btn").addEventListener("click", () => openShareDialog(quote));
          list.appendChild(row);
        });

        article.append(head, list);
        recordsEl.appendChild(article);
      });
    }

    function isEnglishVoice(voice) {
      return voice.lang && voice.lang.toLowerCase().startsWith("en");
    }

    function scoreVoice(voice) {
      const name = voice.name.toLowerCase();
      const lang = voice.lang.toLowerCase();
      const preferredIndex = preferredVoiceWords.findIndex((word) => name.includes(word));
      let score = 0;
      if (lang === "en-us") score += 80;
      else if (lang.startsWith("en-")) score += 40;
      if (preferredIndex >= 0) score += 120 - preferredIndex * 8;
      if (name.includes("premium") || name.includes("enhanced") || name.includes("natural")) score += 25;
      if (name.includes("compact") || name.includes("default")) score -= 25;
      if (voice.localService) score += 8;
      return score;
    }

    function getVoiceCandidates() {
      const seen = new Set();
      return voices
        .filter(isEnglishVoice)
        .sort((a, b) => scoreVoice(b) - scoreVoice(a) || a.name.localeCompare(b.name))
        .filter((voice) => {
          const key = `${voice.name}-${voice.lang}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 3);
    }

    function getBestVoice() {
      const savedName = localStorage.getItem(VOICE_KEY);
      const candidates = getVoiceCandidates();
      const saved = candidates.find((voice) => voice.name === savedName);
      if (saved) return saved;
      return candidates[0] || null;
    }

    function populateVoices() {
      if (!("speechSynthesis" in window)) {
        voiceSelect.disabled = true;
        return;
      }
      voices = window.speechSynthesis.getVoices().filter(isEnglishVoice);
      const savedName = localStorage.getItem(VOICE_KEY);
      const candidates = getVoiceCandidates();
      voiceSelect.innerHTML = '<option value="">自动选择</option>';

      candidates.forEach((voice, index) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `声音 ${index + 1} · ${voice.name} · ${voice.lang}`;
        voiceSelect.appendChild(option);
      });

      if (savedName && candidates.some((voice) => voice.name === savedName)) {
        voiceSelect.value = savedName;
      } else {
        localStorage.removeItem(VOICE_KEY);
        voiceSelect.value = "";
      }
    }

    function speakEnglish(text) {
      if (!("speechSynthesis" in window)) {
        alert("当前浏览器不支持朗读。请用 Chrome、Safari 或 Edge 打开。");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 0.92;
      utterance.volume = 1;
      const voice = getBestVoice();
      if (voice) utterance.voice = voice;
      window.speechSynthesis.speak(utterance);
    }

    function openShareDialog(quote) {
      activeShareQuote = quote;
      shareEnglish.textContent = quote.english;
      shareChinese.textContent = quote.chinese;
      shareSource.textContent = `(${quote.source})`;
      shareQr.src = makeQrDataUrl(PAGE_URL, 2);
      shareDialog.showModal();
    }

    function closeShareDialog() {
      shareDialog.close();
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    function shareQuoteText() {
      if (!activeShareQuote) return "";
      return [
        activeShareQuote.english,
        activeShareQuote.chinese,
        `(${activeShareQuote.source})`,
        PAGE_URL
      ].join("\n");
    }

    function makeQrDataUrl(text, cellSize = 4) {
      if (typeof qrcode !== "function") return "";
      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      return qr.createDataURL(cellSize, 0);
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 8) {
      const tokens = /\s/.test(text) ? text.split(/(\s+)/).filter(Boolean) : [...text];
      const lines = [];
      let line = "";
      tokens.forEach((token) => {
        const test = line + token;
        if (ctx.measureText(test).width > maxWidth && line.trim()) {
          lines.push(line.trim());
          line = token.trimStart();
        } else {
          line = test;
        }
      });
      if (line.trim()) lines.push(line.trim());

      lines.slice(0, maxLines).forEach((item, index) => {
        const suffix = lines.length > maxLines && index === maxLines - 1 ? "..." : "";
        ctx.fillText(item + suffix, x, y + index * lineHeight);
      });
      return y + Math.min(lines.length, maxLines) * lineHeight;
    }

    async function saveShareImage() {
      if (!activeShareQuote) return;
      if (typeof qrcode !== "function") {
        alert("二维码组件还没加载完成，请稍后再试。");
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1350;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#fffaf0";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(239,195,90,0.26)";
      ctx.fillRect(0, 0, canvas.width, 210);
      ctx.fillStyle = "rgba(47,109,85,0.14)";
      ctx.fillRect(canvas.width - 230, canvas.height - 250, 230, 250);

      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 8;
      ctx.strokeRect(54, 54, canvas.width - 108, canvas.height - 108);

      ctx.fillStyle = "#efc35a";
      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      roundRect(ctx, 90, 92, 310, 58, 29, true, true);
      ctx.fillStyle = "#151515";
      ctx.font = "700 24px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText("English Quote Log", 114, 130);

      ctx.fillStyle = "#151515";
      ctx.font = "700 64px Georgia, Times New Roman, serif";
      let y = wrapCanvasText(ctx, activeShareQuote.english, 90, 270, 880, 78, 7);

      ctx.fillStyle = "#194836";
      ctx.font = "700 38px PingFang SC, Microsoft YaHei, sans-serif";
      y = wrapCanvasText(ctx, activeShareQuote.chinese, 90, y + 60, 880, 56, 4);

      ctx.fillStyle = "#6b6257";
      ctx.font = "500 28px Avenir Next, PingFang SC, sans-serif";
      wrapCanvasText(ctx, `(${activeShareQuote.source})`, 90, y + 44, 780, 40, 3);

      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(90, 1154);
      ctx.lineTo(990, 1154);
      ctx.stroke();

      const qrImage = await loadImage(makeQrDataUrl(PAGE_URL, 8));
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      roundRect(ctx, 840, 1170, 120, 120, 8, true, true);
      ctx.drawImage(qrImage, 850, 1180, 100, 100);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) return;
      const file = new File([blob], `english-quote-${Date.now()}.png`, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "English Quote Log",
            text: "保存这张英语句子分享图"
          });
          return;
        } catch (error) {
          if (error.name === "AbortError") return;
        }
      }

      const link = document.createElement("a");
      link.download = file.name;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toLocalDateTimeValue(date = new Date()) {
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 16);
    }

    function openDialog() {
      document.querySelector("#recordTime").value = toLocalDateTimeValue();
      form.reset();
      document.querySelector("#recordTime").value = toLocalDateTimeValue();
      dialog.showModal();
    }

    function closeDialog() {
      dialog.close();
      form.reset();
    }

    function formValue(id) {
      return document.querySelector(id).value.trim();
    }

    function handleSubmit(event) {
      event.preventDefault();
      const timeValue = formValue("#recordTime");
      const next = {
        id: `record-${Date.now()}`,
        time: new Date(timeValue).toISOString(),
        quotes: [1, 2, 3].map((number) => ({
          english: formValue(`#english${number}`),
          chinese: formValue(`#chinese${number}`),
          source: formValue(`#source${number}`)
        }))
      };
      records = [next, ...records];
      saveRecords();
      render();
      closeDialog();
    }

    function exportRecords() {
      const blob = new Blob([JSON.stringify(sortedRecords(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "english-quote-log.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function importRecords(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error("JSON must be an array");
          records = imported;
          saveRecords();
          render();
        } catch (error) {
          alert("导入失败：文件格式不正确。");
        }
      };
      reader.readAsText(file);
    }

    function resetRecords() {
      if (!confirm("确定重置为初始记录吗？")) return;
      records = seedRecords;
      saveRecords();
      render();
    }

    document.querySelector("#addRecordBtn").addEventListener("click", openDialog);
    document.querySelector("#closeDialogBtn").addEventListener("click", closeDialog);
    document.querySelector("#closeShareBtn").addEventListener("click", closeShareDialog);
    document.querySelector("#cancelBtn").addEventListener("click", closeDialog);
    document.querySelector("#exportBtn").addEventListener("click", exportRecords);
    document.querySelector("#importBtn").addEventListener("click", () => importFile.click());
    document.querySelector("#resetBtn").addEventListener("click", resetRecords);
    document.querySelector("#saveShareImageBtn").addEventListener("click", saveShareImage);
    document.querySelector("#copyQuoteBtn").addEventListener("click", () => copyText(shareQuoteText()));
    voiceSelect.addEventListener("change", () => {
      if (voiceSelect.value) localStorage.setItem(VOICE_KEY, voiceSelect.value);
      else localStorage.removeItem(VOICE_KEY);
    });
    importFile.addEventListener("change", (event) => {
      const [file] = event.target.files;
      if (file) importRecords(file);
      event.target.value = "";
    });
    form.addEventListener("submit", handleSubmit);

    populateVoices();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.addEventListener("voiceschanged", populateVoices);
    }
    render();
  </script>
</body>
